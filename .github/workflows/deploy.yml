name: Deploy Lambda ETL

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login no ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin 941377148408.dkr.ecr.us-east-1.amazonaws.com

      - name: Build da imagem
        run: |
          docker build --platform linux/amd64 -t etl-lambda .

      - name: Tag da imagem
        run: |
          docker tag etl-lambda:latest 941377148408.dkr.ecr.us-east-1.amazonaws.com/arthur/etl-lambda:latest

      - name: Push da imagem
        run: |
          docker push 941377148408.dkr.ecr.us-east-1.amazonaws.com/arthur/etl-lambda:latest
